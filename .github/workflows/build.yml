name: Build Dare APK

on:
  workflow_dispatch:
  push:
    branches: ["**"]

permissions:
  contents: write

jobs:
  build_release:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup and Generate Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > app/keystore/release.keystore

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --console=plain assembleFossRelease --warning-mode summary

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Treu-release
          path: app/build/outputs/apk/foss/release/*.apk
